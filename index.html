<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle do ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .btn { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        .on { background-color: #2ecc71; }
        .off { background-color: #e74c3c; }
        #status { font-weight: bold; margin-bottom: 20px; color: #34495e; }
    </style>
</head>
<body>

    <h2>Painel de Controle - Relés ESP32</h2>
    <div id=\"status\">Aguardando credenciais...</div>

    <div>
        <h3>Relé 1 (Pino D2)</h3>
        <button class="btn on" onclick="enviarComando('R1_ON')">Ligar</button>
        <button class="btn off" onclick="enviarComando('R1_OFF')">Desligar</button>
    </div>

    <div>
        <h3>Relé 2 (Pino D4)</h3>
        <button class="btn on" onclick="enviarComando('R2_ON')">Ligar</button>
        <button class="btn off" onclick="enviarComando('R2_OFF')">Desligar</button>
    </div>

    <script>
        // Configurações do Broker (Apenas as rotas públicas ficam expostas)
        const BROKER_HOST = "8117aeb351a5404abd26feb1d2a100fb.s1.eu.hivemq.cloud"; // Ou o endereço do seu broker
        const BROKER_PORT = 8884;                // Porta WebSocket padrão SSL (comum em cloud)

        // Variáveis que vão guardar os dados digitados
        let mqttUser = "";
        let mqttPass = "";

        // Inicializa o cliente Paho MQTT
        const client = new Paho.MQTT.Client(BROKER_HOST, Number(BROKER_PORT), "web_client_" + Math.random().toString(16).substr(2, 8));

        client.onConnectionLost = (responseObject) => {
            document.getElementById("status").innerText = "Conexão perdida! Tentando reconectar automaticamente...";
            setTimeout(conectar, 5000);
        };

        client.onMessageArrived = (message) => {
            console.log("Status recebido do ESP32: " + message.payloadString);
            // Opcional: Atualizar a cor dos botões na tela aqui com base no feedback real do ESP32
        };

        function conectar() {
            // Se as variáveis estiverem vazias, pede ao usuário
            if (!mqttUser || !mqttPass) {
                mqttUser = prompt("Digite o Usuário do broker MQTT:");
                mqttPass = prompt("Digite a Senha do broker MQTT:");

                // Validação caso o usuário clique em 'Cancelar' ou deixe em branco
                if (!mqttUser || !mqttPass) {
                    document.getElementById("status").innerText = "Conexão abortada. Recarregue a página para tentar novamente.";
                    return;
                }
            }

            document.getElementById("status").innerText = "Tentando autenticar na Nuvem...";

            client.connect({
                userName: mqttUser,
                password: mqttPass,
                useSSL: true,
                onSuccess: () => {
                    document.getElementById("status").innerText = "Conectado à Nuvem (Pronto para comandos)";
                    client.subscribe("casa/reles/estado");
                },
                onFailure: (err) => {
                    document.getElementById("status").innerText = "Erro de autenticação: " + err.errorMessage;
                    
                    // Se falhar, limpamos as variáveis para que ele peça os dados novamente na próxima tentativa
                    mqttUser = "";
                    mqttPass = "";
                    
                    console.log("Falha no login. Tentando novamente em 5s...");
                    setTimeout(conectar, 5000);
                }
            });
        }

        function enviarComando(comando) {
            if (client.isConnected()) {
                const message = new Paho.MQTT.Message(comando);
                message.destinationName = "casa/reles/comando";
                client.send(message);
                console.log("Comando enviado: " + comando);
            } else {
                alert("Não foi possível enviar: Você não está conectado ao broker!");
            }
        }

        // Inicia o fluxo pedindo os dados assim que a página carrega
        window.onload = () => {
            conectar();
        };
    </script>
</body>
</html>
