<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle do ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .btn { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        .on { background-color: #2ecc71; }
        .off { background-color: #e74c3c; }
        #status { font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>Painel de Controle - Relés ESP32</h2>
    <div id="status">Conectando ao Broker...</div>

    <div>
        <h3>Relé 1 (Pino D2)</h3>
        <button class="btn on" onclick="enviarComando('R1_ON')">Ligar</button>
        <button class="btn off" onclick="enviarComando('R1_OFF')">Desligar</button>
    </div>

    <div>
        <h3>Relé 2 (Pino D4)</h3>
        <button class="btn on" onclick="enviarComando('R2_ON')">Ligar</button>
        <button class="btn off" onclick="enviarComando('R2_OFF')">Desligar</button>
    </div>

    <script>
        // CONFIGURAÇÕES DO SEU HIVEMQ (Atenção: Use a porta 8884 para WebSockets na Web!)
        const broker = "SEU_CLUSTER_URL.s1.eu.hivemq.cloud";
        const porta = 8884; 
        const usuario = "SEU_USUARIO";
        const senha = "SUA_SENHA";

        // Inicializa o cliente MQTT Paho
        const client = new Paho.MQTT.Client(`wss://${broker}:${porta}/mqtt`, "Web_Client_" + Math.random().toString(16).substr(2, 8));

        client.onConnectionLost = (responseObject) => {
            document.getElementById("status").innerText = "Conexão perdida! Tentando reconectar...";
            setTimeout(conectar, 5000);
        };

        client.onMessageArrived = (message) => {
            console.log("Status recebido do ESP32: " + message.payloadString);
            // Aqui você pode atualizar elementos visuais na tela baseando-se no retorno real do ESP32
        };

        function conectar() {
            client.connect({
                userName: usuario,
                password: senha,
                useSSL: true,
                onSuccess: () => {
                    document.getElementById("status").innerText = "Conectado à Nuvem (Pronto)";
                    client.subscribe("casa/reles/estado");
                },
                onFailure: (err) => {
                    document.getElementById("status").innerText = "Erro ao conectar: " + err.errorMessage;
                }
            });
        }

        function enviarComando(comando) {
            if (client.isConnected()) {
                const message = new Paho.MQTT.Message(comando);
                message.destinationName = "casa/reles/comando";
                client.send(message);
            } else {
                alert("Não conectado à nuvem!");
            }
        }

        // Inicia a conexão
        conectar();
    </script>
</body>
</html>
